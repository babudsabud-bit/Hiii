<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holo-LLM OS 2050</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #00f2ff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }

        #camera-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            filter: grayscale(1) brightness(0.5);
        }

        .hologram-container {
            width: 300px;
            height: 400px;
            position: relative;
            transform-style: preserve-3d;
            animation: float 4s ease-in-out infinite;
        }

        .hologram-core {
            width: 100%;
            height: 100%;
            background: rgba(0, 242, 255, 0.1);
            border: 2px solid #00f2ff;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            padding: 20px;
            clip-path: polygon(10% 0, 90% 0, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0 90%, 0 10%);
        }

        #output-text {
            font-size: 1.2rem;
            margin-top: 20px;
            text-shadow: 0 0 10px #00f2ff;
        }

        .lidar-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.2) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.2) 1px, transparent 1px);
            background-size: 30px 30px;
            transform: rotateX(60deg);
            bottom: -100px;
            left: -50%;
            z-index: -1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateY(0deg); }
            50% { transform: translateY(-20px) rotateY(5deg); }
        }

        .status-bar {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <video id="camera-bg" autoplay playsinline></video>
    
    <div class="lidar-grid"></div>

    <div class="hologram-container">
        <div class="hologram-core">
            <div class="status-bar">LiDAR Active // LLM Online</div>
            <div id="output-text">Initiating neural link... Listening for spatial commands.</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-bg');
        const output = document.getElementById('output-text');

        // Access Camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error("Camera access denied", err);
            }
        }

        // Voice Synthesis for the LLM
        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.pitch = 1.5;
            utter.rate = 1.0;
            synth.speak(utter);
        }

        // Simulated Interaction
        window.onclick = () => {
            const responses = [
                "Spatial mesh analyzed. Hologram stabilized.",
                "LiDAR detecting 3 objects in your vicinity.",
                "System ready. What shall we build today?"
            ];
            const randomMsg = responses[Math.floor(Math.random() * responses.length)];
            output.innerText = randomMsg;
            speak(randomMsg);
        };

        startCamera();
    </script>
</body>
</html>
