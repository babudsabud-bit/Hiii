<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI LIDAR VISION PRO</title>
    <style>
        :root { --lidar-neon: #00ff41; --projector-cyan: #00f2ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }

        /* Real-Time Back Camera Feed */
        #camera-feed {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }

        /* Computer Vision Overlay */
        #vision-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; mix-blend-mode: screen;
        }

        /* HUD Interface */
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            border: 1px solid rgba(0, 255, 65, 0.2);
            box-sizing: border-box;
        }

        .data-stream {
            position: absolute; top: 20px; left: 20px; color: var(--lidar-neon);
            font-size: 11px; text-shadow: 0 0 5px #00ff41;
        }

        #boot-screen {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .pulse-btn {
            background: none; border: 1px solid var(--projector-cyan);
            color: var(--projector-cyan); padding: 20px 40px; cursor: pointer;
            letter-spacing: 3px; font-weight: bold; transition: 0.3s;
        }
        .pulse-btn:hover { background: var(--projector-cyan); color: #000; box-shadow: 0 0 30px var(--projector-cyan); }
    </style>
</head>
<body>

<div id="boot-screen">
    <h1 style="color:white; margin-bottom:40px;">LIDAR SYSTEM v2.0</h1>
    <button class="pulse-btn" onclick="initLidar()">BOOT BACK-CAM SYSTEM</button>
</div>

<div id="hud">
    <div class="data-stream">
        [ CHANNEL: BACK_LENS_ENV ]<br>
        [ SENSOR: SIMULATED_LIDAR ]<br>
        [ DEPTH: <span id="dist-ui">0.00</span>m ]<br>
        [ MAPPING: ACTIVE ]
    </div>
</div>

<video id="camera-feed" autoplay playsinline></video>
<canvas id="vision-canvas"></canvas>

<script>
    const video = document.getElementById('camera-feed');
    const canvas = document.getElementById('vision-canvas');
    const ctx = canvas.getContext('2d');
    const distUI = document.getElementById('dist-ui');

    let touchPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let lerpPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let points = [];

    // Initialize Camera and Screen Mapping
    async function initLidar() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1280 } } 
            });
            video.srcObject = stream;
            document.getElementById('boot-screen').style.display = 'none';
            setupLidarPoints();
            requestAnimationFrame(loop);
        } catch (e) {
            alert("LiDAR requires camera access.");
        }
    }

    // Fixed UI Logic: Sharp Scaling
    function updateSize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', updateSize);
    updateSize();

    // Interaction Tracking
    const moveEvent = (e) => {
        const t = e.touches ? e.touches[0] : e;
        touchPos.x = t.clientX;
        touchPos.y = t.clientY;
    };
    window.addEventListener('mousemove', moveEvent);
    window.addEventListener('touchstart', moveEvent);
    window.addEventListener('touchmove', moveEvent);

    function setupLidarPoints() {
        // Create a grid for the computer vision mesh
        for(let i=0; i<30; i++) {
            points.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2
            });
        }
    }

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Smoothing Logic (The "Projector Gliding" effect)
        lerpPos.x += (touchPos.x - lerpPos.x) * 0.1;
        lerpPos.y += (touchPos.y - lerpPos.y) * 0.1;

        const time = Date.now() * 0.002;
        const depth = (1.5 + Math.sin(time) * 0.5).toFixed(2);
        distUI.innerText = depth;

        // Draw Laser Mesh
        ctx.strokeStyle = 'rgba(0, 255, 65, 0.4)';
        ctx.lineWidth = 1;

        points.forEach(p => {
            // Move points slightly
            p.x += p.vx;
            p.y += p.vy;
            if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
            if(p.y < 0 || p.y > canvas.height) p.vy *= -1;

            // Connect points near the touch/hologram position
            let dx = p.x - lerpPos.x;
            let dy = p.y - lerpPos.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < 200) {
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(lerpPos.x, lerpPos.y);
                ctx.stroke();
            }
        });

        // The AI Hologram (Multimedia Projector Style)
        drawProjectorHologram(lerpPos.x, lerpPos.y, depth);

        requestAnimationFrame(loop);
    }

    function drawProjectorHologram(x, y, d) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00f2ff';
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 2;

        // Geometric Core
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(Date.now() * 0.001);
        
        // Multi-layered scanning rings
        ctx.beginPath();
        ctx.arc(0, 0, 50 * d, 0, Math.PI * 2);
        ctx.stroke();

        ctx.beginPath();
        ctx.rect(-35*d, -35*d, 70*d, 70*d);
        ctx.stroke();

        // Projector "Beam" from bottom of screen
        ctx.restore();
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, canvas.height);
        ctx.lineTo(x, y);
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.15)';
        ctx.stroke();
    }
</script>
</body>
</html>
