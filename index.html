<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER-OS | REAL VISION</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #01050a; }
        body { background: var(--bg); color: var(--neon); font-family: monospace; margin: 0; overflow: hidden; }
        
        #video-container { position: absolute; width: 100%; height: 100%; z-index: -1; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }

        .hud { padding: 30px; background: rgba(1, 5, 10, 0.7); height: 100vh; display: flex; flex-direction: column; }
        .log-screen { flex-grow: 1; border: 1px solid var(--neon); margin: 20px 0; padding: 15px; background: rgba(0,0,0,0.5); overflow-y: auto; }
        
        .detect-box { color: #39ff14; font-weight: bold; font-size: 1.2rem; }
        .btn-start { padding: 20px; border: 2px solid var(--neon); background: transparent; color: var(--neon); cursor: pointer; font-size: 1rem; }
        .btn-start:hover { background: var(--neon); color: #000; }
        
        #scanner { position: absolute; width: 100%; height: 3px; background: #39ff14; top: 0; display: none; animation: scan 2s infinite linear; box-shadow: 0 0 15px #39ff14; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="scanner"></div>
    </div>

    <div class="hud">
        <h1 style="letter-spacing: 5px;">AETHER VISION 2050</h1>
        <button class="btn-start" id="startBtn" onclick="initSystem()">INITIALIZE SENSORS & AI</button>
        
        <div class="log-screen" id="log">
            >> SYSTEM OFFLINE. AWAITING ACTIVATION...
        </div>

        <div id="analysis-result" style="font-size: 1.5rem; text-transform: uppercase;">
            Status: <span id="status">IDLE</span>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const log = document.getElementById('log');
        const statusText = document.getElementById('status');
        const scanner = document.getElementById('scanner');
        let model;

        async function initSystem() {
            log.innerHTML += "<br>>> LOADING NEURAL VISION MODEL (COCO-SSD)...";
            document.getElementById('startBtn').style.display = 'none';
            
            // 1. Load the AI Model
            model = await cocoSsd.load();
            log.innerHTML += "<br>>> MODEL LOADED SUCCESSFULLY.";

            // 2. Start Camera
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            
            log.innerHTML += "<br>>> CAMERA FEED SYNCED.";
            scanner.style.display = 'block';
            
            // 3. Start Analysis Loop
            detectFrame();
        }

        async function detectFrame() {
            const predictions = await model.detect(video);
            
            if (predictions.length > 0) {
                // Take the first thing found
                const mainObject = predictions[0].class;
                const score = Math.round(predictions[0].score * 100);
                
                statusText.innerHTML = `AI DETECTED: <span class="detect-box">${mainObject} (${score}%)</span>`;
                
                // Only speak if it's a new discovery or every few seconds
                speakResult(mainObject);
            }
            
            requestAnimationFrame(detectFrame);
        }

        let lastSpoken = "";
        function speakResult(item) {
            if (item !== lastSpoken) {
                const synth = window.speechSynthesis;
                const speech = new SpeechSynthesisUtterance(`I have found a ${item}`);
                speech.pitch = 0.8;
                synth.speak(speech);
                
                log.innerHTML += `<br>>> ANALYSIS RESULT: ${item.toUpperCase()} DETECTED.`;
                log.scrollTop = log.scrollHeight;
                lastSpoken = item;
            }
        }
    </script>
</body>
</html>
