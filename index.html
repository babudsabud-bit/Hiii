<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETHER-OS | ELITE UPGRADE</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root { --neon: #00f2ff; --err: #ff0055; --bg: #010204; }
        body { background: var(--bg); color: var(--neon); font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        #v-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: brightness(0.5); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Modern Glassmorphism UI */
        .hud { height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; background: radial-gradient(circle, transparent 40%, #000 100%); }
        .status-header { display: flex; justify-content: space-between; font-size: 0.7rem; text-transform: uppercase; border-bottom: 1px solid var(--neon); padding-bottom: 10px; }
        
        .log-box { flex-grow: 1; margin: 20px 0; border: 1px solid rgba(0, 242, 255, 0.2); background: rgba(0,0,0,0.8); padding: 15px; overflow-y: auto; font-family: monospace; }
        .ai-chat { font-size: 1.5rem; color: #fff; text-shadow: 0 0 10px var(--neon); margin-bottom: 20px; min-height: 50px; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .action-btn { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--neon); color: var(--neon); padding: 18px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .action-btn:active { background: var(--neon); color: #000; transform: scale(0.95); }
        
        .error-log { color: var(--err); font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="v-layer"><video id="webcam" autoplay playsinline muted></video></div>

    <div class="hud">
        <div class="status-header">
            <div>AETHER-CORE v6.0</div>
            <div id="sys-status">STATUS: STANDBY</div>
        </div>

        <div class="log-box" id="console">>> SENSORS READY. INITIALIZE HANDSHAKE.</div>
        
        <div class="ai-chat" id="ai-bubble">AI: Awaiting authorization...</div>

        <div class="btn-group">
            <button class="action-btn" onclick="initCore()">ENGAGE AI LINK</button>
            <button class="action-btn" style="border-color: #39ff14; color: #39ff14;" onclick="location.reload()">HARD RESET</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const consoleLog = document.getElementById('console');
        const aiBubble = document.getElementById('ai-bubble');
        const sysStat = document.getElementById('sys-status');
        const synth = window.speechSynthesis;
        let recognition;
        let model;

        // API KEYS (Fill these to connect models)
        const KEYS = { GEMINI: "YOUR_GEMINI_KEY", GPT: "YOUR_OPENAI_KEY" };

        function updateLog(msg, isErr = false) {
            const time = new Date().toLocaleTimeString().split(' ')[0];
            consoleLog.innerHTML += `<div class="${isErr?'error-log':''}">[${time}] ${msg}</div>`;
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        async function initCore() {
            updateLog("STARTING MULTIMODAL HANDSHAKE...");
            try {
                // 1. Force Hardware Permissions
                const stream = await navigator.mediaDevices.getUserMedia({ video: {facingMode: "environment"}, audio: true });
                video.srcObject = stream;
                sysStat.innerText = "STATUS: ONLINE";

                // 2. Load Vision Intelligence
                updateLog("SYNCING NEURAL VISION...");
                model = await cocoSsd.load();
                updateLog("VISION LOADED.");

                // 3. Start Voice Engine
                startVoiceEngine();
                
                // 4. Clear Speech Queue (Fixes "I don't listen" error)
                synth.cancel();
                speak("Aether Core upgraded. Systems optimized.");

            } catch (err) {
                updateLog(`CRITICAL ERROR: ${err.message}`, true);
                aiBubble.innerText = "AI: HARDWARE BLOCKED";
            }
        }

        function startVoiceEngine() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return updateLog("VOICE API NOT SUPPORTED", true);

            recognition = new SpeechRecognition();
            recognition.continuous = false; 

            recognition.onstart = () => { sysStat.style.color = "#39ff14"; };
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                updateLog(`USER: ${text}`);
                processInput(text);
            };

            recognition.onerror = (e) => {
                updateLog(`MIC_FAIL: ${e.error}`, true);
                if(e.error === 'no-speech') restartMic();
            };

            recognition.onend = () => { restartMic(); };
            recognition.start();
        }

        function restartMic() {
            // Only restart if AI isn't currently speaking
            if (!synth.speaking) {
                setTimeout(() => { try { recognition.start(); } catch(e){} }, 300);
            }
        }

        async function processInput(input) {
            aiBubble.innerText = "THINKING...";
            const predictions = await model.detect(video);
            const scene = predictions.length > 0 ? `I see a ${predictions[0].class}. ` : "";
            
            // Integrated Gemini Call
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEYS.GEMINI}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: scene + input }] }] })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                aiBubble.innerText = reply;
                speak(reply);
            } catch (e) {
                const fallback = scene + "I heard you, but the cloud link is offline.";
                aiBubble.innerText = fallback;
                speak(fallback);
            }
        }

        function speak(text) {
            if (recognition) recognition.stop();
            const utter = new SpeechSynthesisUtterance(text);
            utter.onend = () => { if (recognition) recognition.start(); };
            synth.speak(utter);
        }
    </script>
</body>
</html>
