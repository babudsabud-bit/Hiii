<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER-OS | SENSOR CORE</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --bg: #010409;
            --panel-glass: rgba(0, 242, 255, 0.05);
        }

        body {
            background: var(--bg);
            color: var(--neon-blue);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* Full Screen Neural Vision */
        #vision-stream {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: #000;
        }

        video {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.7) contrast(1.2) hue-rotate(180deg);
            opacity: 0.6;
            transition: 0.5s;
        }

        /* Interface Overlay */
        .gui-layer {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            background: radial-gradient(circle, transparent 40%, var(--bg) 100%);
        }

        .side-bar {
            width: 350px;
            background: var(--panel-glass);
            border: 1px solid var(--neon-blue);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .terminal {
            flex-grow: 1;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            margin: 15px 0;
            overflow-y: auto;
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
        }

        .status-dot {
            height: 8px; width: 8px; border-radius: 50%;
            display: inline-block; margin-right: 5px;
            background: #555;
        }

        .active { background: #0f0; box-shadow: 0 0 10px #0f0; }

        .btn-action {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-action:hover {
            background: var(--neon-blue);
            color: #000;
        }

        .btn-mic {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }

        .btn-mic:hover {
            background: var(--neon-pink);
            color: #000;
        }

        /* Scanning HUD */
        #scanner {
            position: absolute;
            width: 100%; height: 2px;
            background: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            display: none;
            animation: scanLoop 2s infinite linear;
        }

        @keyframes scanLoop { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div id="vision-stream">
        <video id="v-feed" autoplay playsinline></video>
        <div id="scanner"></div>
    </div>

    <div class="gui-layer">
        <div class="side-bar">
            <h2 style="margin: 0; letter-spacing: 2px;">AETHER CORE</h2>
            <p style="font-size: 0.7rem; opacity: 0.6;">VERSION 2050.v4 // NO-LINK MODE</p>

            <div style="margin-top: 10px; font-size: 0.8rem;">
                <div><span id="dot-cam" class="status-dot"></span> CAMERA</div>
                <div><span id="dot-mic" class="status-dot"></span> MICROPHONE</div>
                <div><span id="dot-snd" class="status-dot"></span> SOUND SYSTEM</div>
            </div>

            <div class="terminal" id="term">
                > SYSTEM READY...<br>
                > AWAITING SENSOR ACTIVATION...
            </div>

            <input type="text" id="cmdInput" placeholder="Ask AI..." style="background:none; border:1px solid #333; color:var(--neon-blue); padding:10px; margin-bottom:10px;">

            <button class="btn-action" onclick="requestAllPermissions()">1. Activate Sensors</button>
            <button class="btn-action btn-mic" onclick="listenMode()">2. Speak to AI</button>
            <button class="btn-action" style="border-color: #fff; color: #fff;" onclick="runAnalysis()">3. Analyze & Output</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('v-feed');
        const term = document.getElementById('term');
        const scanner = document.getElementById('scanner');
        const synth = window.speechSynthesis;

        function log(msg) {
            term.innerHTML += `> ${msg}<br>`;
            term.scrollTop = term.scrollHeight;
        }

        // Fix: Unified Permission Request
        async function requestAllPermissions() {
            log("REQUESTING SENSOR PERMISSIONS...");
            try {
                // Request Camera & Microphone simultaneously
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: true 
                });
                
                video.srcObject = stream;
                document.getElementById('dot-cam').classList.add('active');
                document.getElementById('dot-mic').classList.add('active');
                document.getElementById('dot-snd').classList.add('active');
                
                log("CAMERA: GRANTED");
                log("MICROPHONE: GRANTED");
                log("SOUND SYSTEM: CALIBRATED");
                
                // Audio Context Resume (fixes sound permission error)
                if (synth.speaking) synth.cancel();
                const welcome = new SpeechSynthesisUtterance("Sensors online. Aether core ready.");
                welcome.pitch = 0.8;
                synth.speak(welcome);

            } catch (err) {
                log("ERROR: PERMISSION DENIED - " + err.message);
                alert("Please enable Camera and Microphone access in your browser settings.");
            }
        }

        // Microphone Logic
        function listenMode() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return log("VOICE NOT SUPPORTED");

            const recognition = new SpeechRecognition();
            recognition.start();
            log("LISTENING...");

            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById('cmdInput').value = text;
                log("INPUT: " + text);
                runAnalysis();
            };
        }

        // Analysis & Sound Output
        function runAnalysis() {
            const query = document.getElementById('cmdInput').value || "Auto-Scan";
            scanner.style.display = 'block';
            video.style.filter = "hue-rotate(90deg) saturate(2) brightness(1)";
            log("ANALYZING PIXELS...");

            setTimeout(() => {
                scanner.style.display = 'none';
                video.style.filter = "brightness(0.7) contrast(1.2) hue-rotate(180deg)";
                
                const response = "Environment analyzed. Hardware configuration optimized for futuristic code deployment.";
                log("AI RESPONSE: " + response);

                const utterance = new SpeechSynthesisUtterance(response);
                utterance.pitch = 0.8;
                utterance.rate = 1.0;
                synth.speak(utterance);
                
                document.getElementById('cmdInput').value = "";
            }, 1800);
        }
    </script>
</body>
</html>
