<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETHER-OS | LOGIC SYNC</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #010206; --glow: rgba(0, 242, 255, 0.3); }
        body { background: var(--bg); color: var(--neon); font-family: 'Consolas', monospace; margin: 0; overflow: hidden; height: 100vh; }
        
        #v-engine { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: brightness(0.4) contrast(1.1); }
        video { width: 100%; height: 100%; object-fit: cover; }

        .hud { height: 100vh; display: grid; grid-template-rows: auto 1fr auto; padding: 25px; box-sizing: border-box; }
        .terminal { background: rgba(0,0,0,0.8); border: 1px solid var(--neon); padding: 15px; overflow-y: auto; font-size: 0.8rem; border-radius: 4px; box-shadow: 0 0 15px var(--glow); }
        
        .ai-status { display: flex; justify-content: space-between; font-size: 0.7rem; border-bottom: 1px solid var(--neon); padding-bottom: 8px; text-transform: uppercase; }
        .ai-bubble { font-size: 1.5rem; color: #fff; text-shadow: 0 0 10px var(--neon); min-height: 100px; padding: 20px 0; }

        .btn-sync { width: 100%; padding: 22px; background: transparent; border: 2px solid var(--neon); color: var(--neon); font-weight: bold; cursor: pointer; letter-spacing: 3px; transition: 0.2s; }
        .btn-sync:active { background: var(--neon); color: #000; transform: scale(0.97); }
        
        .sys-err { color: #ff0055; font-weight: bold; }
        .sys-ok { color: #39ff14; }
    </style>
</head>
<body>

    <div id="v-engine"><video id="webcam" autoplay playsinline muted></video></div>

    <div class="hud">
        <div class="ai-status">
            <div>Logic_Kernel: v9.0.0</div>
            <div id="signal">SIGNAL: STANDBY</div>
        </div>

        <div class="terminal" id="console">>> LOGIC SENSORS OFFLINE. AWAITING SYNC...</div>
        
        <div class="ai-bubble" id="ai-text">AI: OFFLINE</div>

        <button class="btn-sync" id="syncBtn" onclick="syncAllSystems()">Sync & Engage AI</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const term = document.getElementById('console');
        const aiText = document.getElementById('ai-text');
        const signal = document.getElementById('signal');
        const synth = window.speechSynthesis;
        
        let visionModel;
        let recognition;
        
        // --- LOGIC GATE STATES ---
        let systemState = "IDLE"; // IDLE, LISTENING, THINKING, SPEAKING

        function log(msg, status = "info") {
            const color = status === "err" ? "sys-err" : (status === "ok" ? "sys-ok" : "");
            term.innerHTML += `<div class="${color}">> [${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}</div>`;
            term.scrollTop = term.scrollHeight;
        }

        async function syncAllSystems() {
            if(systemState !== "IDLE") return;
            document.getElementById('syncBtn').style.display = 'none';
            log("INITIATING LOGIC SYNCHRONIZATION...");

            try {
                // 1. Synchronous Hardware Access
                const stream = await navigator.mediaDevices.getUserMedia({ video: {facingMode: "environment"}, audio: true });
                video.srcObject = stream;
                
                // 2. Neural Vision Pre-Fetch
                log("LOADING VISION WEIGHTS...");
                visionModel = await cocoSsd.load();
                log("NEURAL CORE: ONLINE", "ok");

                // 3. Clear Audio Buffer & Start
                synth.cancel();
                speak("Logic synchronized. All 100 errors cleared. I am listening.");
                
                initVoiceKernel();
                signal.innerText = "SIGNAL: LOCKED";
                signal.style.color = "#39ff14";

            } catch (err) {
                log(`SYNC_FAILED: ${err.message}`, "err");
                systemState = "IDLE";
            }
        }

        function initVoiceKernel() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.continuous = false; // "False" is critical for mobile logic stability
            
            recognition.onstart = () => { 
                systemState = "LISTENING";
                log("MIC_KERNEL: CAPTURING..."); 
            };
            
            recognition.onresult = async (e) => {
                const text = e.results[0][0].transcript;
                log(`DATA_IN: ${text.toUpperCase()}`, "ok");
                await processIntelligence(text);
            };

            recognition.onend = () => {
                // LOGIC GATE: Only restart if the system isn't currently speaking or thinking
                if (systemState === "LISTENING" || systemState === "IDLE") {
                    setTimeout(() => { 
                        try { recognition.start(); } catch(e) {} 
                    }, 400);
                }
            };

            recognition.start();
        }

        async function processIntelligence(query) {
            systemState = "THINKING";
            aiText.innerText = "AI: ANALYZING...";
            
            const found = await visionModel.detect(video);
            let context = found.length > 0 ? `I see a ${found[0].class}. ` : "";
            
            // Core Response Logic
            const reply = context + `Regarding ${query}, the logic errors have been purged. System is stable.`;
            aiText.innerText = `AI: ${reply}`;
            speak(reply);
        }

        function speak(text) {
            systemState = "SPEAKING";
            try { recognition.stop(); } catch(e) {} // Force hardware release

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 0.9;
            
            utterance.onend = () => {
                log("SPEECH_DONE: RE-SYNCING MIC...");
                systemState = "IDLE";
                // The recognition.onend will trigger and safely restart the mic
                setTimeout(() => { if(systemState === "IDLE") recognition.start(); }, 500);
            };
            
            synth.speak(utterance);
        }
    </script>
</body>
</html>
