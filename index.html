<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI HOLOGRAM V4 - VIVID COLOR</title>
    <style>
        :root { --glow: #00f2ff; --neon-pink: #ff00ff; --bg: #000; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Segoe UI', sans-serif; color: var(--glow); }

        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        /* FIXED: Removed grayscale filter for colorful camera */
        video {
            position: fixed; width: 100vw; height: 100vh;
            object-fit: cover; transform: scaleX(-1);
            filter: brightness(1.1) contrast(1.1); /* Slightly boost color & light */
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 50; touch-action: none; }

        #permission-screen {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center;
        }

        button {
            background: transparent; border: 2px solid var(--glow);
            color: var(--glow); padding: 15px 40px; font-size: 1.2rem;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
        }

        .status-bar {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.5); padding: 10px;
            border-right: 4px solid var(--neon-pink);
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="permission-screen">
        <h1 style="color:white">NEURAL INTERFACE</h1>
        <button id="start-btn">ACTIVATE SYSTEM</button>
    </div>

    <div id="ui-layer">
        <div class="status-bar">
            SYSTEM: ONLINE<br>
            CAM: VIVID_COLOR_MODE<br>
            AI_REF: 2050.v2
        </div>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

<script>
    const v = document.getElementById('v');
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    const startBtn = document.getElementById('start-btn');

    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let smooth = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let frame = 0;

    function resize() {
        const dpr = window.devicePixelRatio || 1;
        c.width = window.innerWidth * dpr;
        c.height = window.innerHeight * dpr;
        ctx.scale(dpr, dpr);
    }
    window.addEventListener('resize', resize);
    resize();

    async function initSystem() {
        try {
            // Requesting high-quality color video
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: 1280, height: 720 }, 
                audio: false 
            });
            v.srcObject = stream;
            document.getElementById('permission-screen').style.display = 'none';
            animate();
        } catch (err) {
            alert("Camera Access Required for Hologram");
        }
    }

    const updateTarget = (e) => {
        const t = e.touches ? e.touches[0] : e;
        mouse.x = t.clientX;
        mouse.y = t.clientY;
    };
    window.addEventListener('mousemove', updateTarget);
    window.addEventListener('touchstart', updateTarget);
    window.addEventListener('touchmove', updateTarget);

    function drawHologram(x, y) {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        
        smooth.x += (x - smooth.x) * 0.15;
        smooth.y += (y - smooth.y) * 0.15;

        frame += 0.04;
        const sX = smooth.x;
        const sY = smooth.y;

        // 1. Colorful Outer Ring (Gradient)
        ctx.lineWidth = 3;
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ff00ff';
        ctx.strokeStyle = '#ff00ff'; 
        
        ctx.beginPath();
        ctx.arc(sX, sY, 70, 0, Math.PI * 2);
        ctx.stroke();

        // 2. Rotating Inner AI Matrix (Cyan)
        ctx.shadowColor = '#00f2ff';
        ctx.strokeStyle = '#00f2ff';
        ctx.save();
        ctx.translate(sX, sY);
        ctx.rotate(-frame * 2);
        for(let i=0; i<8; i++) {
            ctx.rotate(Math.PI / 4);
            ctx.strokeRect(-40, -40, 80, 80);
        }
        ctx.restore();

        // 3. Floating Data Particles
        ctx.fillStyle = '#fff';
        for(let i=0; i<5; i++) {
            let px = sX + Math.cos(frame + i) * 100;
            let py = sY + Math.sin(frame + i) * 100;
            ctx.fillRect(px, py, 2, 2);
        }

        // 4. ID Label
        ctx.shadowBlur = 0;
        ctx.font = "bold 14px monospace";
        ctx.fillStyle = "#00f2ff";
        ctx.fillText(`AI_TARGET_LOC: ${Math.round(sX)},${Math.round(sY)}`, sX + 85, sY + 5);
    }

    function animate() {
        drawHologram(mouse.x, mouse.y);
        requestAnimationFrame(animate);
    }

    startBtn.onclick = initSystem;
</script>
</body>
</html>
