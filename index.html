<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER-OS | ALWAYS-ON AI</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #39ff14;
            --bg: #010206;
        }

        body {
            background: var(--bg);
            color: var(--neon-blue);
            font-family: 'Consolas', monospace;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* Full Screen Vision */
        #vision-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        video {
            width: 100%; height: 100%; object-fit: cover;
            filter: contrast(1.1) brightness(0.6) saturate(0.5);
            transition: filter 0.3s;
        }

        .ai-thinking video {
            filter: hue-rotate(120deg) brightness(0.9) saturate(2);
        }

        /* Interface Overlay */
        .hud-layer {
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: radial-gradient(circle, transparent 30%, rgba(1, 2, 6, 0.9) 100%);
        }

        .status-box {
            border: 1px solid var(--neon-blue);
            padding: 20px;
            width: 300px;
            background: rgba(0, 242, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .pulse-indicator {
            height: 12px; width: 12px; border-radius: 50%;
            background: var(--neon-green);
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 15px var(--neon-green);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .chat-stream {
            font-size: 1.1rem;
            max-width: 600px;
            text-shadow: 0 0 10px var(--neon-blue);
            line-height: 1.6;
        }

        .listening-status {
            color: var(--neon-green);
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        /* Scanner */
        #scan-laser {
            position: absolute; width: 100%; height: 3px;
            background: var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green);
            top: -10px; display: none;
            animation: scanLine 2.5s infinite linear;
        }

        @keyframes scanLine { 0% { top: 0; } 100% { top: 100%; } }

        .btn-init {
            padding: 20px 40px;
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div id="vision-bg">
        <video id="v-stream" autoplay playsinline></video>
        <div id="scan-laser"></div>
    </div>

    <div class="hud-layer">
        <div class="status-box">
            <div><span class="pulse-indicator"></span> ALWAYS-ON ACTIVE</div>
            <div class="listening-status" id="mic-status">INITIALIZING...</div>
        </div>

        <div id="init-screen" style="position: absolute; top:50%; left:50%; transform:translate(-50%,-50%);">
            <button class="btn-init" onclick="startAlwaysOn()">Activate AI Assistant</button>
        </div>

        <div class="chat-stream" id="output">
            </div>
    </div>

    <script>
        const video = document.getElementById('v-stream');
        const output = document.getElementById('output');
        const micStatus = document.getElementById('mic-status');
        const scanLaser = document.getElementById('scan-laser');
        const synth = window.speechSynthesis;

        let recognition;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        async function startAlwaysOn() {
            document.getElementById('init-screen').style.display = 'none';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: true 
                });
                video.srcObject = stream;

                if (SpeechRecognition) {
                    recognition = new SpeechRecognition();
                    recognition.continuous = false; // We restart manually to keep it "Always On"
                    recognition.interimResults = false;
                    
                    recognition.onstart = () => {
                        micStatus.innerText = "LISTENING...";
                        micStatus.style.color = "var(--neon-green)";
                    };

                    recognition.onresult = (event) => {
                        const transcript = event.results[0][0].transcript;
                        handleAIResponse(transcript);
                    };

                    recognition.onend = () => {
                        // This is the "Always-On" core: restart if not currently speaking
                        if (!synth.speaking) {
                            recognition.start();
                        }
                    };

                    recognition.start();
                    speak("Always on mode enabled. I am listening.");
                }

            } catch (err) {
                alert("Please grant camera and microphone access.");
            }
        }

        function handleAIResponse(input) {
            output.innerHTML = `<span style="color:white;">User:</span> ${input}`;
            
            // Visual Processing
            document.body.classList.add('ai-thinking');
            scanLaser.style.display = 'block';
            micStatus.innerText = "ANALYZING...";
            micStatus.style.color = "orange";

            // Advanced Response Logic (Simulated LLM)
            setTimeout(() => {
                const responses = [
                    "I have analyzed the visual data. The environment is stable.",
                    "Processing confirmed. I have optimized the robotic nodes for your query.",
                    "Based on the camera feed, I suggest an advanced UI update for this project.",
                    "Data received. Everything is functioning within 2050 parameters."
                ];
                const reply = responses[Math.floor(Math.random() * responses.length)];
                
                output.innerHTML += `<br><span style="color:var(--neon-blue);">AI:</span> ${reply}`;
                
                speak(reply);
            }, 1500);
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 0.85;
            utterance.rate = 1.0;
            
            utterance.onstart = () => {
                recognition.stop(); // Stop listening while talking to avoid feedback
            };

            utterance.onend = () => {
                document.body.classList.remove('ai-thinking');
                scanLaser.style.display = 'none';
                recognition.start(); // Go back to "Always-On" listening
            };

            synth.speak(utterance);
        }
    </script>
</body>
</html>
