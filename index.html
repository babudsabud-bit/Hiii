<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI PROJECTOR PRO - LiDAR MODE</title>
    <style>
        :root { --projector-beam: rgba(0, 255, 255, 0.4); --ui-cyan: #00f2ff; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }

        /* Full Color Back Camera */
        video {
            position: fixed; width: 100vw; height: 100vh;
            object-fit: cover;
            filter: contrast(1.2) saturate(1.2); /* Enhanced for Projector look */
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 10; mix-blend-mode: screen; }

        #overlay {
            position: absolute; inset: 0; z-index: 100; pointer-events: none;
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
        }

        .hud-data {
            position: absolute; top: 20px; left: 20px; color: var(--ui-cyan);
            font-size: 10px; letter-spacing: 1px; line-height: 1.5;
        }

        #init-screen {
            position: fixed; inset: 0; z-index: 1000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .btn-launch {
            background: none; border: 2px solid var(--ui-cyan); color: var(--ui-cyan);
            padding: 20px 40px; cursor: pointer; font-weight: bold;
            box-shadow: 0 0 20px var(--projector-beam);
        }
    </style>
</head>
<body>

    <div id="init-screen">
        <h2 style="color:white; margin-bottom:30px;">AI MULTIMEDIA PROJECTOR</h2>
        <button class="btn-launch" onclick="startProjector()">ENABLE BACK CAMERA & LiDAR</button>
    </div>

    <div id="overlay">
        <div class="hud-data">
            LENS: BACK_WIDE_ANGLE<br>
            MODE: DEPTH_PROJECTOR_2050<br>
            STATUS: <span id="depth-val">SCANNING...</span>
        </div>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

<script>
    const v = document.getElementById('v');
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    const depthVal = document.getElementById('depth-val');

    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let smooth = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let frame = 0;

    function resize() {
        c.width = window.innerWidth * window.devicePixelRatio;
        c.height = window.innerHeight * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }
    window.addEventListener('resize', resize);
    resize();

    async function startProjector() {
        try {
            // UPDATED: Forced use of BACK camera ("environment")
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: { exact: "environment" },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                } 
            });
            v.srcObject = stream;
            document.getElementById('init-screen').style.display = 'none';
            render();
        } catch (e) {
            // Fallback for desktop or if 'exact' environment fails
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            v.srcObject = stream;
            document.getElementById('init-screen').style.display = 'none';
            render();
        }
    }

    // Touch Interaction for Projection Target
    const setTarget = (e) => {
        const t = e.touches ? e.touches[0] : e;
        mouse.x = t.clientX;
        mouse.y = t.clientY;
    };
    window.addEventListener('mousemove', setTarget);
    window.addEventListener('touchstart', setTarget);
    window.addEventListener('touchmove', setTarget);

    function drawLiDARProjector(x, y) {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        
        // Smoothing Logic
        smooth.x += (x - smooth.x) * 0.1;
        smooth.y += (y - smooth.y) * 0.1;
        frame += 0.03;

        const sX = smooth.x;
        const sY = smooth.y;

        // Simulated Depth Logic: The hologram grows/shrinks slightly to simulate LiDAR range
        const depthScale = 1 + Math.sin(frame * 0.5) * 0.1;
        depthVal.innerText = (depthScale * 4.2).toFixed(2) + "m";

        // 1. The "Projector Beam" lines (coming from the corner of the screen)
        ctx.beginPath();
        ctx.moveTo(0, 0); 
        ctx.lineTo(sX, sY);
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
        ctx.stroke();

        // 2. Main Hologram Core
        ctx.save();
        ctx.translate(sX, sY);
        ctx.scale(depthScale, depthScale);
        
        // Outer Hexagon
        ctx.beginPath();
        for(let i=0; i<6; i++) {
            ctx.rotate(Math.PI / 3);
            ctx.lineTo(80, 0);
        }
        ctx.closePath();
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 2;
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00f2ff';
        ctx.stroke();

        // Inner Spinning "LiDAR" Rings
        ctx.rotate(frame * 2);
        ctx.beginPath();
        ctx.arc(0, 0, 40, 0, Math.PI * 1.5);
        ctx.stroke();
        
        ctx.restore();

        // 3. UI Scanning Lines
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(sX - 150, sY); ctx.lineTo(sX + 150, sY);
        ctx.moveTo(sX, sY - 150); ctx.lineTo(sX, sY + 150);
        ctx.stroke();
    }

    function render() {
        drawLiDARProjector(mouse.x, mouse.y);
        requestAnimationFrame(render);
    }
</script>
</body>
</html>
