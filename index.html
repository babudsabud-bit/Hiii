<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETHER-OS | ONLINE CORE</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root { --neon: #00f2ff; --bio: #39ff14; --bg: #010206; }
        body { background: var(--bg); color: var(--neon); font-family: 'Consolas', monospace; margin: 0; overflow: hidden; height: 100vh; }
        
        #v-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: brightness(0.4) contrast(1.2); }
        video { width: 100%; height: 100%; object-fit: cover; }

        .hud { height: 100vh; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; background: radial-gradient(circle, transparent 40%, #000 100%); }
        .terminal { flex-grow: 1; border: 1px solid var(--neon); background: rgba(0,0,0,0.85); padding: 15px; overflow-y: auto; font-size: 0.8rem; margin: 15px 0; box-shadow: 0 0 15px rgba(0,242,255,0.1); }
        
        .status-header { display: flex; justify-content: space-between; font-size: 0.7rem; letter-spacing: 2px; border-bottom: 1px solid var(--neon); padding-bottom: 10px; }
        .ai-voice-out { font-size: 1.6rem; color: #fff; text-shadow: 0 0 10px var(--neon); min-height: 80px; transition: 0.3s; }

        .btn-engage { width: 100%; padding: 22px; background: rgba(0,242,255,0.05); border: 2px solid var(--neon); color: var(--neon); font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; letter-spacing: 3px; }
        .btn-engage:active { transform: scale(0.96); background: var(--neon); color: #000; }
        
        .online-glow { color: var(--bio) !important; text-shadow: 0 0 15px var(--bio) !important; }
        .log-bio { color: var(--bio); }
    </style>
</head>
<body>

    <div id="v-bg"><video id="webcam" autoplay playsinline muted></video></div>

    <div class="hud">
        <div class="status-header">
            <div>LOGIC_UPGRADE: v10.0</div>
            <div id="status-tag">STATUS: OFFLINE</div>
        </div>

        <div class="terminal" id="console">>> SYSTEM STANDBY. PRESS ENGAGE TO SYNC...</div>
        
        <div class="ai-voice-out" id="ai-text">AI: OFFLINE</div>

        <button class="btn-engage" id="mainBtn" onclick="initializeAI()">Engage Neural Link</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const consoleLog = document.getElementById('console');
        const aiText = document.getElementById('ai-text');
        const statusTag = document.getElementById('status-tag');
        const synth = window.speechSynthesis;
        
        let visionModel;
        let recognition;
        let isSpeaking = false; 

        function log(msg, type = "") {
            const cls = type === "bio" ? 'class="log-bio"' : '';
            consoleLog.innerHTML += `<div ${cls}>> [${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}</div>`;
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        async function initializeAI() {
            document.getElementById('mainBtn').style.display = 'none';
            log("INITIATING HARDWARE SYNC...");

            try {
                // 1. Sync Camera & Mic
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: true 
                });
                video.srcObject = stream;
                log("SENSORS SYNCED.");

                // 2. Load the AI Model (Wait for this!)
                log("LOADING NEURAL VISION BRAIN...");
                visionModel = await cocoSsd.load();
                
                // 3. Switch to ONLINE
                log("NEURAL CORE LOADED.", "bio");
                statusTag.innerText = "STATUS: ONLINE";
                statusTag.style.color = "var(--bio)";
                aiText.innerText = "AI: ONLINE";
                aiText.classList.add("online-glow");

                // 4. Force First Reply
                synth.cancel();
                speak("Systems analyzed. Hardware is optimized. I am now online and listening.");
                
                // 5. Start the perpetual mic loop
                startListening();

            } catch (err) {
                log(`CRITICAL FAIL: ${err.message}`, "err");
                aiText.innerText = "AI: ERROR";
            }
        }

        function startListening() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.continuous = false; 
            
            recognition.onstart = () => { log("MIC: ACTIVE"); };
            
            recognition.onresult = async (e) => {
                const text = e.results[0][0].transcript;
                log(`HEARD: ${text.toUpperCase()}`, "bio");
                processAndReply(text);
            };

            recognition.onend = () => {
                // Safety logic: only restart if we aren't talking
                if (!isSpeaking) {
                    setTimeout(() => { try { recognition.start(); } catch(e) {} }, 400);
                }
            };

            recognition.start();
        }

        async function processAndReply(query) {
            aiText.innerText = "AI: THINKING...";
            const found = await visionModel.detect(video);
            let response = "";

            if (found.length > 0) {
                response = `I see a ${found[0].class}. Regarding ${query}, the analysis is complete.`;
            } else {
                response = `I heard you say ${query}. The environment is clear.`;
            }

            aiText.innerText = `AI: ${response}`;
            speak(response);
        }

        function speak(text) {
            isSpeaking = true;
            try { recognition.stop(); } catch(e) {}

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 0.9;
            utterance.onstart = () => { isSpeaking = true; };
            utterance.onend = () => {
                isSpeaking = false;
                log("RE-ENGAGING SENSORS...");
            };
            synth.speak(utterance);
        }
    </script>
</body>
</html>
