<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI PROJECTOR ANALYZER 2050</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }

        /* RAW COLOR CAMERA - NO FILTERS */
        #projector-feed {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }

        /* PROJECTOR OVERLAY */
        #projector-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; mix-blend-mode: screen; /* Makes colors "project" onto the camera */
        }

        /* ANALYZER HUD */
        #hud {
            position: fixed; inset: 0; z-index: 10; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px; color: #fff;
        }

        .hud-header { border-left: 4px solid #00f2ff; padding-left: 10px; background: rgba(0,0,0,0.3); width: fit-content; }
        .hud-footer { font-family: monospace; font-size: 12px; color: #00f2ff; }

        #init-overlay {
            position: fixed; inset: 0; z-index: 100; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .btn-launch {
            background: #00f2ff; color: #000; border: none; padding: 15px 30px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="init-overlay">
        <h2 style="color:white">MULTIMEDIA PROJECTOR SYSTEM</h2>
        <button class="btn-launch" onclick="launchSystem()">Start Back-Cam Analysis</button>
    </div>

    <div id="hud">
        <div class="hud-header">
            <b>AI ANALYZER ACTIVE</b><br>
            <small>LENS: BACK_COLOR_WIDE</small>
        </div>
        <div class="hud-footer">
            X_COORD: <span id="pos-x">0</span> | Y_COORD: <span id="pos-y">0</span><br>
            SIGNAL: HIGH_RES_COLOR
        </div>
    </div>

    <video id="projector-feed" autoplay playsinline></video>
    <canvas id="projector-canvas"></canvas>

<script>
    const v = document.getElementById('projector-feed');
    const c = document.getElementById('projector-canvas');
    const ctx = c.getContext('2d');
    const posX = document.getElementById('pos-x');
    const posY = document.getElementById('pos-y');

    let target = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let current = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let rotation = 0;

    async function launchSystem() {
        try {
            // BACK CAMERA - HIGH QUALITY & COLOR
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
            });
            v.srcObject = stream;
            document.getElementById('init-overlay').style.display = 'none';
            resize();
            loop();
        } catch (e) {
            alert("Please allow camera access for the Projector app.");
        }
    }

    function resize() {
        c.width = window.innerWidth;
        c.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);

    // ANALYZER CONTROL: Touch to target a point in the room
    const setTarget = (e) => {
        const t = e.touches ? e.touches[0] : e;
        target.x = t.clientX;
        target.y = t.clientY;
    };
    window.addEventListener('mousemove', setTarget);
    window.addEventListener('touchstart', setTarget);
    window.addEventListener('touchmove', setTarget);

    function loop() {
        ctx.clearRect(0, 0, c.width, c.height);

        // Smoothing for Projector Gliding
        current.x += (target.x - current.x) * 0.1;
        current.y += (target.y - current.y) * 0.1;
        rotation += 0.02;

        posX.innerText = Math.round(current.x);
        posY.innerText = Math.round(current.y);

        // DRAW PROJECTED ANALYZER
        drawProjectedGraphics(current.x, current.y);

        requestAnimationFrame(loop);
    }

    function drawProjectedGraphics(x, y) {
        ctx.save();
        ctx.translate(x, y);

        // 1. Scanner Crosshair
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-100, 0); ctx.lineTo(100, 0);
        ctx.moveTo(0, -100); ctx.lineTo(0, 100);
        ctx.stroke();

        // 2. Rotating Analysis Ring
        ctx.rotate(rotation);
        ctx.lineWidth = 3;
        ctx.setLineDash([20, 10]);
        ctx.beginPath();
        ctx.arc(0, 0, 60, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);

        // 3. Central Core (Bright Glow)
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#00f2ff';
        ctx.fillStyle = 'rgba(0, 242, 255, 0.4)';
        ctx.beginPath();
        ctx.arc(0, 0, 15, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();

        // 4. Projector Light Beam
        // This simulates the light coming from the lens to the touch point
        ctx.beginPath();
        ctx.moveTo(c.width / 2, c.height + 50); // Bottom of screen (The Projector)
        ctx.lineTo(x, y);
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.1)';
        ctx.lineWidth = 40; // Wide beam
        ctx.stroke();
    }
</script>
</body>
</html>
