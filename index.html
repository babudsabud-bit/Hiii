<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER-OS | FORCED SENSORS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root { --neon: #00f2ff; --err: #ff0055; --bg: #010206; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; }
        
        #vision-bg { position: absolute; width: 100%; height: 100%; z-index: -1; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }

        .hud { height: 100%; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; }
        .log-window { flex-grow: 1; border: 1px solid var(--neon); background: rgba(0,0,0,0.8); padding: 15px; overflow-y: auto; margin: 20px 0; font-size: 0.85rem; }
        
        .status-panel { display: flex; gap: 20px; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        .indicator { padding: 5px 10px; border: 1px solid #333; }
        .active { border-color: var(--neon); color: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .error { border-color: var(--err); color: var(--err); }

        .btn-core { padding: 20px; background: transparent; border: 2px solid var(--neon); color: var(--neon); cursor: pointer; font-weight: 900; letter-spacing: 3px; }
        .btn-core:active { transform: scale(0.98); }
        
        #scan-line { position: absolute; width: 100%; height: 2px; background: var(--neon); top: 0; display: none; animation: scan 3s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div id="vision-bg">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="scan-line"></div>
    </div>

    <div class="hud">
        <div class="status-panel">
            <div id="cam-stat" class="indicator">CAM: OFF</div>
            <div id="mic-stat" class="indicator">MIC: OFF</div>
            <div id="ai-stat" class="indicator">AI: OFFLINE</div>
        </div>

        <div class="log-window" id="console">
            >> SYSTEM READY. AWAITING HARDWARE COMMAND...
        </div>

        <div id="ai-output" style="font-size: 1.4rem; min-height: 60px; margin-bottom: 10px; color: white;">
            AI: WAITING FOR INPUT...
        </div>

        <button class="btn-core" onclick="forceInitialize()">ACTIVATE ALWAYS-ON SENSORS</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const consoleLog = document.getElementById('console');
        const aiOutput = document.getElementById('ai-output');
        const scanLine = document.getElementById('scan-line');
        const synth = window.speechSynthesis;
        
        let model;
        let isListening = false;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        function updateLog(msg, isError = false) {
            const color = isError ? "var(--err)" : "var(--neon)";
            consoleLog.innerHTML += `<div style="color:${color}">>> ${msg}</div>`;
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        async function forceInitialize() {
            updateLog("FORCING HARDWARE ACCESS...");
            
            try {
                // 1. Request combined permissions
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: true 
                });
                
                video.srcObject = stream;
                document.getElementById('cam-stat').className = "indicator active";
                document.getElementById('cam-stat').innerText = "CAM: ON";
                updateLog("CAMERA PERMISSION GRANTED.");

                // 2. Load Vision AI
                updateLog("LOADING TENSORFLOW VISION BRAIN...");
                model = await cocoSsd.load();
                document.getElementById('ai-stat').className = "indicator active";
                document.getElementById('ai-stat').innerText = "AI: ONLINE";
                scanLine.style.display = "block";
                updateLog("VISION AI ACTIVE.");

                // 3. Start Infinite Voice Listener
                startVoiceLoop();
                
                // 4. Start Vision Loop
                runVision();

                speak("Sensors fully engaged. I am watching and listening perpetually.");

            } catch (err) {
                updateLog("CRITICAL ERROR: " + err.message, true);
                if (err.name === "NotAllowedError") {
                    alert("ERROR: Camera/Mic blocked. Please go to browser settings and 'Allow' access.");
                }
            }
        }

        function startVoiceLoop() {
            if (!SpeechRecognition) {
                updateLog("SPEECH RECOGNITION NOT SUPPORTED", true);
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.continuous = false; // We use false and manual restart to prevent "hanging"
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                document.getElementById('mic-stat').className = "indicator active";
                document.getElementById('mic-stat').innerText = "MIC: LISTENING";
            };

            recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                updateLog(`HEARD: "${text.toUpperCase()}"`);
                await processInput(text);
            };

            recognition.onerror = (event) => {
                updateLog("MIC ERROR: " + event.error, true);
            };

            recognition.onend = () => {
                isListening = false;
                document.getElementById('mic-stat').className = "indicator";
                document.getElementById('mic-stat').innerText = "MIC: SLEEP";
                // PERPETUAL RESTART: Restart listening if AI isn't speaking
                if (!synth.speaking) {
                    recognition.start();
                }
            };

            recognition.start();
        }

        async function processInput(text) {
            aiOutput.innerText = "AI: ANALYZING...";
            const predictions = await model.detect(video);
            
            let foundText = "";
            if (predictions.length > 0) {
                foundText = `I see a ${predictions[0].class}. `;
            } else {
                foundText = "I cannot see clearly, but I heard you. ";
            }

            const finalReply = foundText + "Ready for your next command.";
            aiOutput.innerText = `AI: ${finalReply}`;
            speak(finalReply);
        }

        async function runVision() {
            if (model) {
                const predictions = await model.detect(video);
                // Background processing to keep AI "warm"
            }
            requestAnimationFrame(runVision);
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 0.8;
            utterance.rate = 1.0;
            
            utterance.onend = () => {
                // Once done talking, make sure mic starts again if it died
                if (!isListening) startVoiceLoop();
            };
            
            synth.speak(utterance);
        }
    </script>
</body>
</html>
